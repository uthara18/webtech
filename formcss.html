<!DOCTYPE html>
<html>
<head>
<title>Premium Registration Form</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#000000,#1c1c1c,#2c2c2c);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:40px 15px;
    min-height:100vh;
    color:white;
}

/* FORM CONTAINER */
.container{
    width:100%;
    max-width:450px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    padding:35px;
    border-radius:20px;
    box-shadow:0 0 30px rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.2);
    margin-bottom:40px;
}

h1{
    text-align:center;
    margin-bottom:25px;
    letter-spacing:2px;
}

/* INPUTS */
label{
    font-size:14px;
}

input, select{
    width:100%;
    padding:12px;
    margin-top:6px;
    margin-bottom:18px;
    border-radius:10px;
    border:none;
    outline:none;
    font-size:14px;
}

input{
    background:#ffffff;
    color:black;
}

input[type="range"]{
    accent-color:black;
}

.gender{
    display:flex;
    gap:20px;
    margin-bottom:15px;
}

/* BUTTON */
.submit-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:30px;
    background:linear-gradient(to right,#ffffff,#dcdcdc);
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.submit-btn:hover{
    background:black;
    color:white;
    transform:scale(1.05);
}

/* TABLE */
table{
    width:95%;
    max-width:1000px;
    border-collapse:collapse;
    background:white;
    color:black;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

th{
    background:black;
    color:white;
    padding:12px;
}

td{
    padding:10px;
    text-align:center;
}

tr:nth-child(even){
    background:#f2f2f2;
}

tr:hover{
    background:#ddd;
}

/* COPY BUTTON */
.copy-btn{
    margin-top:20px;
    padding:10px 25px;
    border:none;
    border-radius:25px;
    background:black;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

.copy-btn:hover{
    background:#444;
}
</style>
</head>

<body>

<div class="container">
<h1>REGISTRATION</h1>

<form id="regForm">

<label>Full Name *</label>
<input type="text" id="name" required>

<label>Age *</label>
<div style="display:flex;align-items:center;">
<input type="range" min="18" max="60" value="18" id="age">
<span id="ageValue" style="margin-left:15px;font-weight:bold;">18</span>
</div>

<label>Email *</label>
<input type="email" id="email" required>

<label>Password *</label>
<input type="password" id="password" required>

<label>Telephone *</label>
<input type="tel" id="phone" required>

<label>Date of Birth</label>
<input type="date" id="dob">

<label>Gender *</label>
<div class="gender">
<label><input type="radio" name="gender" value="Male" required> Male</label>
<label><input type="radio" name="gender" value="Female"> Female</label>
</div>

<input type="submit" value="Submit" class="submit-btn">

</form>
</div>

<div id="tableContainer" style="text-align:center;"></div>

<script>

const slider = document.getElementById("age");
const ageText = document.getElementById("ageValue");
const form = document.getElementById("regForm");
const tableContainer = document.getElementById("tableContainer");

slider.addEventListener("input", function(){
    ageText.textContent = this.value;
});

let records = [];

form.addEventListener("submit", function(e){
    e.preventDefault();

    const data = {
        name: document.getElementById("name").value.trim(),
        age: slider.value,
        email: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value,
        phone: document.getElementById("phone").value,
        dob: document.getElementById("dob").value || "N/A",
        gender: document.querySelector("input[name='gender']:checked").value
    };

    records.push(data);

    displayTable();
    form.reset();
    ageText.textContent = "18";
});

function displayTable(){

    if(records.length === 0){
        tableContainer.innerHTML = "";
        return;
    }

    let html = "<table id='dataTable'>";
    html += "<tr><th>Name</th><th>Age</th><th>Email</th><th>Password</th><th>Phone</th><th>DOB</th><th>Gender</th></tr>";

    records.forEach(record=>{
        html += `<tr>
        <td>${record.name}</td>
        <td>${record.age}</td>
        <td>${record.email}</td>
        <td>${record.password}</td>
        <td>${record.phone}</td>
        <td>${record.dob}</td>
        <td>${record.gender}</td>
        </tr>`;
    });

    html += "</table>";
    html += "<br><button class='copy-btn' onclick='copyTable()'>Copy Table</button>";

    tableContainer.innerHTML = html;
}

function copyTable(){
    const text = document.getElementById("dataTable").innerText;
    navigator.clipboard.writeText(text).then(()=>{
        alert("Table Copied Successfully!");
    });
}

</script>

</body>
</html>
