<!DOCTYPE html>
<html>
<head>
<title>Study Planner Dashboard</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(120deg,#1e3c72,#2a5298);
margin:0;
padding:0;
color:white;
text-align:center;
}

h1{
margin-top:20px;
}

.container{
width:80%;
margin:auto;
margin-top:30px;
background:rgba(255,255,255,0.1);
padding:25px;
border-radius:10px;
backdrop-filter: blur(5px);
}

input,select{
padding:10px;
margin:8px;
border:none;
border-radius:5px;
}

button{
padding:10px 15px;
background:#00c6ff;
border:none;
border-radius:5px;
color:white;
cursor:pointer;
}

button:hover{
background:#0072ff;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
padding:10px;
border:1px solid white;
}

th{
background:#0072ff;
}

.progressBox{
margin-top:20px;
font-size:18px;
}

.progressBar{
width:100%;
background:#ddd;
height:20px;
border-radius:10px;
overflow:hidden;
}

.progress{
height:20px;
background:#00ff95;
width:0%;
}

.deleteBtn{
background:red;
padding:5px 10px;
border:none;
color:white;
border-radius:4px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>Student Study Planner</h1>

<div class="container">

<input type="text" id="subject" placeholder="Subject">

<input type="text" id="task" placeholder="Task">

<select id="priority">
<option value="High">High Priority</option>
<option value="Medium">Medium Priority</option>
<option value="Low">Low Priority</option>
</select>

<button onclick="addTask()">Add Task</button>

<table id="taskTable">

<tr>
<th>Subject</th>
<th>Task</th>
<th>Priority</th>
<th>Status</th>
<th>Action</th>
</tr>

</table>

<div class="progressBox">

Completion: <span id="percent">0%</span>

<div class="progressBar">
<div class="progress" id="progressBar"></div>
</div>

</div>

</div>

<script>

let totalTasks = 0
let completedTasks = 0

function addTask(){

let subject = document.getElementById("subject").value
let task = document.getElementById("task").value
let priority = document.getElementById("priority").value

if(subject=="" || task==""){
alert("Please enter subject and task")
return
}

let table = document.getElementById("taskTable")

let row = table.insertRow()

let c1 = row.insertCell(0)
let c2 = row.insertCell(1)
let c3 = row.insertCell(2)
let c4 = row.insertCell(3)
let c5 = row.insertCell(4)

c1.innerHTML = subject
c2.innerHTML = task
c3.innerHTML = priority

let check = document.createElement("input")
check.type="checkbox"

check.onclick=function(){
if(this.checked){
completedTasks++
}else{
completedTasks--
}

updateProgress()
}

c4.appendChild(check)

let del = document.createElement("button")
del.innerHTML="Delete"
del.className="deleteBtn"

del.onclick=function(){
table.deleteRow(row.rowIndex)
totalTasks--
updateProgress()
}

c5.appendChild(del)

totalTasks++

updateProgress()

document.getElementById("subject").value=""
document.getElementById("task").value=""

}

function updateProgress(){

let percent = 0

if(totalTasks>0){
percent = (completedTasks/totalTasks)*100
}

percent = percent.toFixed(0)

document.getElementById("percent").innerText = percent+"%"

document.getElementById("progressBar").style.width = percent+"%"

}

</script>

</body>
</html>
